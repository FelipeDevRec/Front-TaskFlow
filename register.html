<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="brand">
        <div class="brand__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"></path>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
        </div>
        <div>
          <h1>TaskFlow</h1>
          <p>Crie sua conta e comece a se organizar.</p>
        </div>
      </div>

      <header class="auth-header">
        <h2>Criar conta</h2>
        <p>Preencha os dados abaixo para acessar o sistema.</p>
      </header>

      <form id="registerForm" class="form-stack" novalidate>
        <div class="field">
          <label for="name">Nome completo</label>
          <input id="name" type="text" placeholder="Seu nome" autocomplete="name" required>
          <small class="error" id="nameError"></small>
        </div>

        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" required>
          <small class="error" id="emailError"></small>
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <div class="password-wrap">
            <input id="password" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
            <button type="button" class="icon-btn" data-toggle-password="password" aria-label="Mostrar senha">
              <span>👁️</span>
            </button>
          </div>
          <div class="strength">
            <div class="strength__bar"><span id="strengthFill"></span></div>
            <small id="strengthLabel">Força da senha</small>
          </div>
          <small class="error" id="passwordError"></small>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirmar senha</label>
          <div class="password-wrap">
            <input id="confirmPassword" type="password" placeholder="Repita sua senha" autocomplete="new-password" required>
            <button type="button" class="icon-btn" data-toggle-password="confirmPassword" aria-label="Mostrar senha">
              <span>👁️</span>
            </button>
          </div>
          <small class="error" id="confirmError"></small>
        </div>

        <label class="check-inline check-inline--start">
          <input type="checkbox" id="terms">
          <span>Concordo com os termos de uso e política de privacidade.</span>
        </label>
        <small class="error" id="termsError"></small>

        <button type="submit" class="btn btn-primary btn-block">Criar conta</button>
      </form>

      <p class="auth-footer">Já tem conta? <a href="index.html">Fazer login</a></p>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
  <script>
    Auth.redirectIfLoggedIn();
    Auth.setupPasswordToggles();

    const registerForm = document.getElementById('registerForm');
    const passwordField = document.getElementById('password');
    const strengthFill = document.getElementById('strengthFill');
    const strengthLabel = document.getElementById('strengthLabel');
    const toast = document.getElementById('toast');

    function setError(id, message) {
      document.getElementById(id).textContent = message;
    }

    passwordField.addEventListener('input', () => {
      const strength = Auth.getPasswordStrength(passwordField.value);
      strengthFill.style.width = strength.width;
      strengthFill.style.background = strength.color;
      strengthLabel.textContent = strength.label;
      strengthLabel.style.color = strength.color;
    });

    registerForm.addEventListener('submit', (event) => {
      event.preventDefault();
      ['nameError', 'emailError', 'passwordError', 'confirmError', 'termsError'].forEach(id => setError(id, ''));

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const terms = document.getElementById('terms').checked;

      let hasError = false;

      if (!name) {
        setError('nameError', 'Informe seu nome.');
        hasError = true;
      }

      if (!Auth.validateEmail(email)) {
        setError('emailError', 'Informe um e-mail válido.');
        hasError = true;
      }

      if (password.length < 8) {
        setError('passwordError', 'A senha deve ter pelo menos 8 caracteres.');
        hasError = true;
      }

      if (password !== confirmPassword) {
        setError('confirmError', 'As senhas não coincidem.');
        hasError = true;
      }

      if (!terms) {
        setError('termsError', 'Você precisa aceitar os termos para continuar.');
        hasError = true;
      }

      if (hasError) return;

      const result = Auth.register(name, email, password);

      if (!result.success) {
        Auth.showToast(toast, result.message);
        return;
      }

      Auth.showToast(toast, 'Conta criada com sucesso!');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1200);
    });
  </script>
</body>
</html>
