<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #f4f6f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .card {
      background: white;
      padding: 32px 28px;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: #4a90e2;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .card-header { margin-bottom: 24px; }
    .card-header h2 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .card-header p { font-size: 14px; color: #666; }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a2e;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #4a90e2;
      outline: none;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
    }

    input.error { border-color: #ff4d4d; }

    .input-wrapper { position: relative; }

    .toggle-password {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      color: #999; display: flex; align-items: center; transition: color 0.2s;
    }
    .toggle-password:hover { color: #4a90e2; }

    .row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; flex-wrap: wrap; gap: 8px;
    }

    .checkbox-label {
      display: flex; align-items: center; gap: 7px;
      font-size: 13px; color: #555; cursor: pointer;
    }
    .checkbox-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: #4a90e2; cursor: pointer; }

    .forgot { font-size: 13px; color: #4a90e2; text-decoration: none; font-weight: 500; }
    .forgot:hover { text-decoration: underline; }

    .btn-primary {
      width: 100%; padding: 11px; background: #4a90e2; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #357abd; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: #a0c4f1; cursor: not-allowed; transform: none; }

    .divider {
      text-align: center; margin: 20px 0; position: relative; font-size: 13px; color: #999;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%; width: calc(50% - 28px); height: 1px; background: #e5e7eb;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .footer-text { text-align: center; font-size: 13px; color: #666; margin-top: 20px; }
    .footer-text a { color: #4a90e2; font-weight: 600; text-decoration: none; }
    .footer-text a:hover { text-decoration: underline; }

    .error-msg { font-size: 12px; color: #ff4d4d; margin-top: 4px; display: none; }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a2e; color: white; padding: 10px 20px;
      border-radius: 8px; font-size: 14px; opacity: 0;
      transition: opacity 0.3s, transform 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      body { align-items: flex-start; }
      .card { padding: 24px 18px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
      <h1>TaskFlow</h1>
    </div>

    <div class="card-header">
      <h2>Bem-vindo de volta 👋</h2>
      <p>Entre na sua conta para continuar</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
        <span class="error-msg" id="emailError">Informe um e-mail válido.</span>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="padding-right: 40px;">
          <button type="button" class="toggle-password" aria-label="Mostrar senha" id="togglePwd">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="error-msg" id="passwordError">A senha não pode ser vazia.</span>
      </div>

      <div class="row">
        <label class="checkbox-label">
          <input type="checkbox" id="remember"> Lembrar de mim
        </label>
        <a href="#" class="forgot">Esqueci a senha</a>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">Entrar</button>
    </form>

    <div class="divider">ou</div>

    <p class="footer-text">
      Não tem uma conta? <a href="register.html">Criar conta</a>
    </p>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');
    const togglePwd = document.getElementById('togglePwd');
    const eyeIcon = document.getElementById('eyeIcon');

    togglePwd.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.innerHTML = isPassword
        ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      let valid = true;

      emailError.style.display = 'none';
      passwordError.style.display = 'none';
      emailInput.classList.remove('error');
      passwordInput.classList.remove('error');

      if (!validateEmail(emailInput.value.trim())) {
        emailError.style.display = 'block';
        emailInput.classList.add('error');
        valid = false;
      }
      if (!passwordInput.value.trim()) {
        passwordError.style.display = 'block';
        passwordInput.classList.add('error');
        valid = false;
      }

      if (valid) {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Entrando...';
        setTimeout(() => { window.location.href = 'index.html'; }, 1200);
      }
    });
  </script>
</body>
</html>
