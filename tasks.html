<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Minhas Tarefas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header>
      <div class="header-top">
        <h1>TaskFlow</h1>
        <button id="logoutBtn" class="btn-logout">Sair</button>
      </div>
      <p id="counter"></p>
    </header>
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Adicionar nova tarefa...">
      <button id="addBtn">Adicionar</button>
    </div>
    <div class="filters">
      <button data-filter="all" class="active">Todas</button>
      <button data-filter="active">Ativas</button>
      <button data-filter="completed">Concluidas</button>
    </div>
    <ul id="taskList"></ul>
    <p id="emptyState">Nenhuma tarefa ainda</p>
  </main>
  <script src="script.js"></script>
</body>
</html>
